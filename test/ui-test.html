<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Umbra EQ — UI logic tests</title>
  <style>
    body { font: 13px ui-monospace, Menlo, Consolas, monospace; background: #14120e; color: #ece3d2; padding: 16px; }
    .pass { color: #7ec98f; } .fail { color: #ff6b6b; font-weight: bold; }
    #summary { font-size: 15px; margin: 10px 0; } ol { line-height: 1.5; }
    /* keep the real EQ offscreen so popup.js can render into it */
    #app { position: absolute; left: -9999px; top: 0; }
  </style>
</head>
<body>
  <h1>Umbra EQ — popup logic tests</h1>
  <div id="summary">running…</div>
  <ol id="results"></ol>

  <script>
    // Minimal chrome mock so popup.js boots without a real extension.
    const _listeners = [];
    window.chrome = {
      runtime: {
        id: 'test', onMessage: { addListener: (f) => _listeners.push(f) },
        sendMessage: (msg, cb) => { setTimeout(() => cb && cb({ type: 'workspaceStatus', initializing: true, eqFilters: [], streams: [], gain: 1, sampleRate: 44100, presets: {} }), 5); return Promise.resolve(); },
        getURL: (p) => p, getManifest: () => ({ version: 'test' }), get lastError() { return null; }
      },
      tabs: { query: (q, cb) => cb([{ id: 1, title: 't', favIconUrl: '' }]) },
      storage: { local: { get: () => Promise.resolve({}), set: () => {} }, sync: { get: () => Promise.resolve({}), set: () => {}, remove: () => {} } },
      action: { setBadgeText() {}, setBadgeBackgroundColor() {} }
    };
    try { localStorage.THEME = 'stale-theme'; localStorage.SHOW_VISUALIZER = ''; } catch (e) {}
  </script>

  <!-- Full popup DOM (offscreen) so popup.js wires up cleanly -->
  <div id="app">
    <body data-theme="eclipse"></body>
    <h1><span class="led"></span><span class="accent"></span></h1>
    <span id="warning"></span>
    <div id="mainDiv">
      <input id="tab-1" type="radio" name="tg" checked /><label id="label-1" for="tab-1">C</label>
      <input id="tab-2" type="radio" name="tg" /><label for="tab-2">G</label>
      <input id="tab-3" type="radio" name="tg" /><label for="tab-3">A</label>
      <div id="eqDiv"><svg id="gainSvg" width="30" height="300"></svg><svg id="eqSvg" width="600" height="300"></svg>
        <div id="eqOptionsDiv"><button id="vizButton"></button></div></div>
      <div id="guideDiv"></div><div id="tabsDiv"><div id="eqTabList"></div></div>
    </div>
    <div id="filterButtonsDiv"><input id="presetNameInput" /><button id="savePresetButton"></button>
      <button id="deletePresetButton"></button><button id="resetFiltersButton"></button>
      <button id="exportPresetsButton"></button><button id="importPresetsButton"></button><input type="file" id="importPresetsFile" /></div>
    <div id="presetDiv"><button id="bassBoostButton"></button><span id="userPresetSpan"></span></div>
    <div id="eqThisTabDiv"><button id="eqTabButton"><span class="btn-label"></span></button></div>
    <div id="noticeDiv"></div>
    <div id="themeBar"><button id="diagBtn"></button><select id="themeSelect"><option value="eclipse">Eclipse</option><option value="nocturne">Nocturne</option><option value="aurora">Aurora</option><option value="solar">Solar</option></select></div>
    <div id="dbg"></div><a id="fullscreen-link" href="#"></a>
  </div>

  <script src="../snap.svg-min.js"></script>
  <script src="../popup.js"></script>

  <script>
    window.addEventListener('load', () => setTimeout(() => {
      const results = [];
      const ok = (name, cond, extra) => results.push({ name, pass: !!cond, extra: extra || '' });
      const near = (name, a, b, tol) => ok(name, Math.abs(a - b) <= (tol || 0.5), 'got ' + a + ' exp ~' + b);

      try {
        // Coordinate transforms round-trip
        [20, 200, 2000, 20000].forEach((f) => near('freqToX/xToFreq round-trips ' + f, xToFreq(freqToX(f)), f, f * 0.02));
        [-20, 0, 15].forEach((db) => near('dbToY/yToDb round-trips ' + db, yToDb(dbToY(db)), db, 0.01));

        // biquadCoefficients produce finite numbers
        const c = biquadCoefficients('peaking', 1000, 1, 6);
        ok('biquad coeffs finite', [c.b0, c.b1, c.b2, c.a1, c.a2].every(Number.isFinite), JSON.stringify(c));

        // normalizePresets: legacy named-object format
        let p = normalizePresets({ Night: { frequencies: Array(11).fill(1000), gains: Array(11).fill(3), qs: Array(11).fill(0.7) } });
        ok('legacy format imports', p.Night && p.Night.gains[0] === 3);

        // normalizePresets: alt keys (f/g/q) + array-of-presets
        p = normalizePresets([{ name: 'X', f: Array(11).fill(500), g: Array(11).fill(-2), q: Array(11).fill(1) }]);
        ok('array + alt-keys imports', p.X && p.X.frequencies[0] === 500);

        // normalizePresets: malformed is skipped, __proto__ blocked
        p = normalizePresets({ bad: { nope: 1 }, __proto__: { frequencies: [1], gains: [1], qs: [1] } });
        ok('malformed skipped', !('bad' in p), JSON.stringify(Object.keys(p)));
        ok('__proto__ not polluting', !('__proto__' in p) || Object.getOwnPropertyNames(p).indexOf('__proto__') === -1);

        // normalizePresets: garbage returns empty
        ok('garbage -> empty', Object.keys(normalizePresets('lol')).length === 0);
        ok('null -> empty', Object.keys(normalizePresets(null)).length === 0);

        // filterType mapping
        ok('filterType 0=lowshelf', filterType(0) === 'lowshelf');
        ok('filterType 10=highshelf', filterType(10) === 'highshelf');
        ok('filterType 5=peaking', filterType(5) === 'peaking');
      } catch (e) {
        ok('suite ran', false, String(e && e.stack || e));
      }

      const passed = results.filter((r) => r.pass).length;
      const failed = results.length - passed;
      window.__results = { passed, failed, total: results.length, results };
      document.getElementById('summary').innerHTML =
        (failed === 0 ? '<span class=pass>ALL PASS</span> ' : '<span class=fail>' + failed + ' FAILED</span> ') + passed + '/' + results.length;
      const ol = document.getElementById('results');
      results.forEach((r) => { const li = document.createElement('li'); li.className = r.pass ? 'pass' : 'fail'; li.textContent = (r.pass ? '✓ ' : '✗ ') + r.name + (r.pass ? '' : '  — ' + r.extra); ol.appendChild(li); });
    }, 400));
  </script>
</body>
</html>

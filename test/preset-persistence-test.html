<!DOCTYPE html>
<html>
<head><meta charset="utf-8" /><title>preset persistence regression</title></head>
<body>
  <div id="summary">running…</div>
  <ol id="results"></ol>
  <script>
    const _msg = []; const _chg = [];
    const syncStore = {
      'PRESETS.121': { frequencies: Array(11).fill(1000), gains: Array(11).fill(2), qs: Array(11).fill(0.7) },
      'PRESETS.hueta': { frequencies: Array(11).fill(800), gains: Array(11).fill(-3), qs: Array(11).fill(0.7) },
      'PRESETS.main': { frequencies: Array(11).fill(500), gains: Array(11).fill(4), qs: Array(11).fill(0.7) }
    };
    const localStore = {};
    window.__engineDropsPresets = false;
    function fireChange(area, changes) { _chg.forEach((f) => { try { f(changes, area); } catch (e) {} }); }
    window.chrome = {
      runtime: {
        id: 'test', onMessage: { addListener: (f) => _msg.push(f) },
        sendMessage: (m, cb) => { setTimeout(() => cb && cb({ ok: true }), 1); return Promise.resolve(); },
        getURL: (x) => x, getManifest: () => ({ version: 'test' }), get lastError() { return null; }
      },
      tabs: { query: (q, cb) => cb([{ id: 1, title: 't', favIconUrl: '' }]) },
      storage: {
        local: { get: () => Promise.resolve(Object.assign({}, localStore)), set: (o) => { Object.assign(localStore, o); return Promise.resolve(); } },
        sync: {
          get: () => Promise.resolve(Object.assign({}, syncStore)),
          set: (o) => { Object.assign(syncStore, o); fireChange('sync', o); return Promise.resolve(); },
          remove: (k) => { const ks = Array.isArray(k) ? k : [k]; const c = {}; ks.forEach((x) => { delete syncStore[x]; c[x] = {}; }); fireChange('sync', c); return Promise.resolve(); }
        },
        onChanged: { addListener: (f) => _chg.push(f) }
      },
      action: { setBadgeText() {}, setBadgeBackgroundColor() {} }
    };
    try { localStorage.THEME = 'stale-theme'; localStorage.SHOW_VISUALIZER = ''; } catch (e) {}
    window.__sendStatus = (over) => {
      const presets = window.__engineDropsPresets ? {} : (() => { const p = {}; for (const k in syncStore) if (k.startsWith('PRESETS.')) p[k.slice(8)] = syncStore[k]; return p; })();
      const base = { type: 'workspaceStatus', sampleRate: 44100, gain: 1,
        eqFilters: Array.from({ length: 11 }, (_, i) => ({ frequency: 1000, gain: 0, q: 0.7, type: i === 0 ? 'lowshelf' : i === 10 ? 'highshelf' : 'peaking' })),
        streams: [], presets };
      const msg = Object.assign(base, over || {});
      _msg.forEach((f) => { try { f(msg); } catch (e) {} });
    };
  </script>
  <div id="app" style="position:absolute;left:-9999px;top:0">
    <span id="readout"></span><span id="warning"></span>
    <button id="vizButton"></button><button id="guideToggle"></button><button id="tabsToggle"></button>
    <div class="screen-bezel"><div id="eqDiv"><svg id="gainSvg" width="30" height="300"></svg><svg id="eqSvg" width="600" height="300"></svg></div>
      <div id="guideDiv" class="screen-overlay"></div><div id="tabsDiv" class="screen-overlay"><div id="eqTabList"></div></div></div>
    <div class="control-rail"><button id="eqTabButton"><span class="btn-label"></span></button>
      <button id="resetFiltersButton"></button><button id="presetDrawerHandle" aria-controls="presetDrawer"><span class="chev"></span></button></div>
    <div id="presetDrawer"><div class="preset-tray"><input id="presetNameInput" /><button id="savePresetButton"></button><button id="deletePresetButton"></button>
      <button id="bassBoostButton" class="pd-row pd-factory"></button><span id="userPresetSpan"></span>
      <button id="exportPresetsButton"></button><button id="importPresetsButton"></button><input type="file" id="importPresetsFile" /></div></div>
    <div id="noticeDiv"></div><button id="diagBtn"></button><select id="themeSelect"><option value="eclipse">Eclipse</option><option value="nocturne">Nocturne</option><option value="aurora">Aurora</option><option value="solar">Solar</option></select>
    <span id="verLabel"></span><a id="fullscreen-link" href="#"></a><div id="dbg"></div>
  </div>
  <script src="../snap.svg-min.js"></script>
  <script src="../popup.js"></script>
  <script>
    const names = () => Array.from(document.querySelectorAll('#userPresetSpan .pd-row span:first-child')).map((s) => s.textContent);
    const wait = (ms) => new Promise((r) => setTimeout(r, ms));
    window.addEventListener('load', () => setTimeout(async () => {
      const results = []; const ok = (n, c, e) => results.push({ name: n, pass: !!c, extra: e || '' });
      try {
        await wait(200);
        ok('boot: 3 presets rendered', names().join(',') === '121,hueta,main', names().join(','));
        window.__engineDropsPresets = false; window.__sendStatus(); await wait(30);
        ok('status(with presets): intact', names().length === 3, names().join(','));
        window.__engineDropsPresets = true; window.__sendStatus(); await wait(30);
        ok('status(empty presets): NOT wiped', names().length === 3, '[' + names().join(',') + ']');
        // Probe the in-memory preset cache via a REAL code path: typing an existing
        // name flips the Save button to 'Update "name"' (reads lastStatus.presets).
        // If the empty-status race had wiped the cache, it would stay '+ Save'.
        const nameEl = document.getElementById('presetNameInput');
        const saveBtn = document.getElementById('savePresetButton');
        nameEl.value = 'main'; nameEl.dispatchEvent(new Event('input'));
        await wait(20);
        ok('preset cache survived empty status (Update label)', /Update/.test(saveBtn.textContent), 'label=' + saveBtn.textContent);
        nameEl.value = '';
        document.getElementById('presetNameInput').value = 'fresh'; await savePresetLocal('fresh'); await wait(40);
        ok('save new: appears with others', names().join(',') === '121,fresh,hueta,main', names().join(','));
        window.__sendStatus(); await wait(30);
        ok('save then empty status: kept', names().indexOf('fresh') !== -1, names().join(','));
        await deletePresetLocal('hueta'); await wait(40);
        ok('delete: only target removed', names().join(',') === '121,fresh,main', names().join(','));
        chrome.storage.sync.set({ 'PRESETS.external': { frequencies: Array(11).fill(300), gains: Array(11).fill(1), qs: Array(11).fill(0.7) } }); await wait(50);
        ok('onChanged: external preset appears', names().indexOf('external') !== -1, names().join(','));
      } catch (e) { ok('suite ran', false, String((e && e.stack) || e)); }
      const passed = results.filter((r) => r.pass).length; const failed = results.length - passed;
      window.__results = { passed, failed, total: results.length, results };
      document.getElementById('summary').innerHTML = (failed === 0 ? 'ALL PASS ' : failed + ' FAILED ') + passed + '/' + results.length;
      const ol = document.getElementById('results');
      results.forEach((r) => { const li = document.createElement('li'); li.textContent = (r.pass ? 'PASS ' : 'FAIL ') + r.name + (r.pass ? '' : ' -- ' + r.extra); ol.appendChild(li); });
    }, 300));
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Umbra EQ — visual harness (real popup.html + real CSS)</title>
  <script>
    const _msg = [];
    const extremePreset = {
      frequencies: [20, 40, 80, 160, 320, 640, 1280, 2560, 5120, 10240, 20480],
      gains: [6, 5, 3, 1, -1, -2, -1, 1, 2, 3, 4],
      qs: Array(11).fill(0.7071)
    };
    const syncStore = { 'PRESETS.121': { frequencies: extremePreset.frequencies, gains: [30,30,20,8,0,-2,0,2,8,18,26], qs: Array(11).fill(0.7071) }, 'PRESETS.Vocal Lift': extremePreset };
    const localStore = {};
    window.chrome = {
      runtime: {
        id: 'test',
        onMessage: { addListener: (f) => _msg.push(f) },
        sendMessage: (m, cb) => { setTimeout(() => cb && cb({ ok: true }), 1); return Promise.resolve(); },
        getURL: (x) => x,
        getManifest: () => ({ version: '1.0.1' }),
        get lastError() { return null; }
      },
      tabs: { query: (q, cb) => cb([{ id: 1, title: 't', favIconUrl: '' }]) },
      storage: {
        local: { get: () => Promise.resolve(Object.assign({}, localStore)), set: (o) => { Object.assign(localStore, o); return Promise.resolve(); } },
        sync: {
          get: () => Promise.resolve(Object.assign({}, syncStore)),
          set: (o) => { Object.assign(syncStore, o); return Promise.resolve(); },
          remove: (k) => { (Array.isArray(k) ? k : [k]).forEach((x) => delete syncStore[x]); return Promise.resolve(); }
        },
        onChanged: { addListener: () => {} }
      },
      action: { setBadgeText() {}, setBadgeBackgroundColor() {} }
    };
    try { localStorage.THEME = 'stale-theme'; localStorage.SHOW_VISUALIZER = ''; } catch (e) {}
  </script>
  <link rel="stylesheet" type="text/css" href="../popup.css" />
  <script src="../snap.svg-min.js"></script>
  <script src="../popup.js" defer></script>
</head>
<body data-theme="eclipse">
  <div class="face">
    <header class="top">
      <div class="brand">
        <svg class="mark" viewBox="0 0 32 32" fill="none" aria-hidden="true">
          <mask id="umbraCut">
            <rect width="32" height="32" fill="#fff" />
            <circle cx="20.5" cy="13.5" r="11" fill="#000" />
          </mask>
          <circle cx="16" cy="16" r="12" fill="#CE3535" mask="url(#umbraCut)" />
          <circle cx="20.5" cy="13.5" r="11" fill="none" stroke="#CE3535" stroke-width="1.4" stroke-opacity="0.5" />
        </svg>
        <span class="nm">UMBRA<b>·EQ</b></span>
      </div>
      <div class="top-right"></div>
    </header>
    <div class="chips">
      <button id="vizButton" class="chip chip-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l3 8l4-16l3 8h4"/></svg>Spectrum<span class="led-dot"></span></button>
      <button id="guideToggle" class="chip chip-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 19a9 9 0 0 1 9 0a9 9 0 0 1 9 0M3 6a9 9 0 0 1 9 0a9 9 0 0 1 9 0M3 6v13M12 6v13M21 6v13"/></svg>Guide</button>
      <button id="tabsToggle" class="chip chip-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2zm3 1h.01M9 8h.01"/></svg>Tabs</button>
    </div>
    <div class="caution">
      <svg class="warn-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"><path d="M12 9v4m-1.637-9.409L2.257 17.125a1.914 1.914 0 0 0 1.636 2.871h16.214a1.914 1.914 0 0 0 1.636-2.87L13.637 3.59a1.914 1.914 0 0 0-3.274 0M12 16h.01"/></svg>
      <span id="warning">Loud audio can harm hearing — keep it sensible</span>
    </div>
    <div class="screen">
      <div id="eqDiv"><svg id="gainSvg" width="26" height="220"></svg><svg id="eqSvg" width="480" height="220"></svg></div>
      <div id="guideDiv" class="screen-overlay"></div>
      <div id="tabsDiv" class="screen-overlay"><div id="eqTabList"></div></div>
    </div>
    <div class="deck">
      <button id="eqTabButton"><svg class="btn-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 6a7.75 7.75 0 1 0 10 0m-5-2v8"/></svg><span class="btn-label">EQ This Tab</span></button>
      <button id="resetFiltersButton" class="rail-key"><svg class="key-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19.95 11a8 8 0 1 0-.5 4m.5 5v-5h-5"/></svg>Reset</button>
      <span class="rail-spacer"></span>
      <button id="presetDrawerHandle" class="rail-handle open" aria-expanded="true" aria-controls="presetDrawer"><span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9l6 6l6-6"/></svg></span>Presets</button>
    </div>
    <div id="presetDrawer" class="open">
      <div class="preset-tray">
        <div class="pd-name">
          <input id="presetNameInput" type="text" placeholder="Name a preset…" />
          <button id="savePresetButton">+ Save</button>
          <button id="deletePresetButton" class="pd-hidden-delete">- Delete</button>
        </div>
        <div class="pd-library">
          <span id="userPresetSpan"></span>
        </div>
        <div class="pd-io">
          <button id="exportPresetsButton">Export</button>
          <button id="importPresetsButton">Import</button>
          <input type="file" id="importPresetsFile" accept=".json,application/json" />
        </div>
      </div>
    </div>
    <div id="noticeDiv"></div>
    <div class="nameplate">
      <span id="diagWrap" hidden><button id="diagBtn">⧉ Diagnostics</button><span class="sep">·</span></span>
      <label for="themeSelect">Theme</label>
      <div class="theme-select" id="themeSelect"><button type="button" class="theme-trigger" id="themeTrigger" aria-expanded="false"><span id="themeCurrent">Eclipse</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9l6 6l6-6"/></svg></button><ul class="theme-menu" id="themeMenu" role="listbox"><li role="option" data-theme="eclipse">Eclipse</li><li role="option" data-theme="nocturne">Nocturne</li><li role="option" data-theme="aurora">Aurora</li><li role="option" data-theme="solar">Solar</li></ul></div>
      <span class="np-spacer"></span>
      <a id="fullscreen-link" target="_blank" href="#"><svg class="fs-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8V6a2 2 0 0 1 2-2h2M4 16v2a2 2 0 0 0 2 2h2m8-16h2a2 2 0 0 1 2 2v2m-4 12h2a2 2 0 0 0 2-2v-2"/></svg>Full window</a>
    </div>
    <div id="dbg"></div>
  </div>
  <script>
    window.addEventListener('load', () => setTimeout(async () => {
      try { await applyPresetByName('121'); } catch (e) { document.title = 'ERR ' + e; }
      setTimeout(() => { window.__ready = true; document.title = 'READY'; }, 250);
    }, 450));
  </script>
</body>
</html>

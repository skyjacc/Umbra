<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Umbra EQ — engine tests</title>
  <style>
    body { font: 13px ui-monospace, Menlo, Consolas, monospace; background: #14120e; color: #ece3d2; padding: 16px; }
    .pass { color: #7ec98f; }
    .fail { color: #ff6b6b; font-weight: bold; }
    h1 { font-size: 15px; }
    #summary { font-size: 15px; margin: 10px 0; }
    ol { line-height: 1.5; }
  </style>
</head>
<body>
  <h1>Umbra EQ — offscreen engine tests</h1>
  <div id="summary">running…</div>
  <ol id="results"></ol>

  <!-- 1) Mock chrome.* (real AudioContext is provided by the browser) -->
  <script>
    const _local = {};
    const _sync = {};
    const _offListeners = [];
    window.__broadcasts = [];

    function pick(store, keys) {
      if (keys == null) return { ...store };
      const out = {};
      (Array.isArray(keys) ? keys : [keys]).forEach((k) => { if (k in store) out[k] = store[k]; });
      return out;
    }

    window.chrome = {
      runtime: {
        id: 'test',
        onMessage: { addListener: (f) => _offListeners.push(f) },
        sendMessage: (msg) => { window.__broadcasts.push(msg); return Promise.resolve(); },
        getContexts: () => Promise.resolve([]),
        getURL: (p) => p,
        get lastError() { return null; }
      },
      storage: {
        local: {
          get: (keys) => Promise.resolve(pick(_local, keys)),
          set: (o) => { Object.assign(_local, o); return Promise.resolve(); }
        },
        sync: {
          get: (keys) => Promise.resolve(pick(_sync, keys)),
          set: (o) => { Object.assign(_sync, o); return Promise.resolve(); },
          remove: (k) => { (Array.isArray(k) ? k : [k]).forEach((x) => delete _sync[x]); return Promise.resolve(); }
        }
      }
    };

    // Deliver a message to the offscreen listener(s) and resolve with the response.
    function send(msg) {
      return new Promise((resolve) => {
        let done = false;
        const sendResponse = (r) => { if (!done) { done = true; resolve(r); } };
        let async = false;
        for (const l of _offListeners) {
          const ret = l({ target: 'offscreen', ...msg }, {}, sendResponse);
          if (ret === true) async = true;
        }
        if (!async && !done) resolve(undefined);
        // safety timeout
        setTimeout(() => { if (!done) { done = true; resolve({ __timeout: true }); } }, 2000);
      });
    }
  </script>

  <!-- 2) The real engine under test -->
  <script src="../offscreen.js"></script>

  <!-- 3) The test suite -->
  <script>
    (async () => {
      const results = [];
      const ok = (name, cond, extra) => results.push({ name, pass: !!cond, extra: extra || '' });
      const eq = (name, a, b) => ok(name, a === b, 'got ' + JSON.stringify(a) + ' expected ' + JSON.stringify(b));
      const near = (name, a, b, tol) => ok(name, Math.abs(a - b) <= (tol || 0.01), 'got ' + a + ' expected ~' + b);

      try {
        // getStatus returns a real workspace status (not initializing, 11 bands)
        let s = await send({ type: 'getStatus' });
        ok('getStatus replies', s && s.type === 'workspaceStatus', JSON.stringify(s && Object.keys(s)));
        ok('getStatus not initializing', s && !s.initializing);
        eq('11 eqFilters', s && s.eqFilters && s.eqFilters.length, 11);
        ok('band0 is lowshelf', s.eqFilters[0].type === 'lowshelf');
        ok('band10 is highshelf', s.eqFilters[10].type === 'highshelf');
        ok('band5 is peaking', s.eqFilters[5].type === 'peaking');

        // modifyFilter changes the reported value
        await send({ type: 'modifyFilter', index: 4, frequency: 500, gain: 8, q: 1.2 });
        await new Promise((r) => setTimeout(r, 30));
        s = await send({ type: 'getStatus' });
        near('modifyFilter gain applied', s.eqFilters[4].gain, 8, 0.5);
        near('modifyFilter freq applied', s.eqFilters[4].frequency, 500, 5);

        // clamps: extreme gain is clamped to ±30
        await send({ type: 'modifyFilter', index: 3, frequency: 160, gain: 999, q: 0.7 });
        s = await send({ type: 'getStatus' });
        ok('gain clamped to <=30', s.eqFilters[3].gain <= 30, 'got ' + s.eqFilters[3].gain);

        // bassBoost preset: band0 -> 340Hz +5dB
        await send({ type: 'applyPreset', preset: 'bassBoost' });
        s = await send({ type: 'getStatus' });
        near('bassBoost band0 gain +5', s.eqFilters[0].gain, 5, 0.5);
        near('bassBoost band0 freq 340', s.eqFilters[0].frequency, 340, 5);

        // resetFilters -> all gains 0
        await send({ type: 'resetFilters' });
        s = await send({ type: 'getStatus' });
        ok('reset all gains to 0', s.eqFilters.every((f) => Math.abs(f.gain) < 0.01));

        // importPresets writes to sync and shows up in status
        await send({ type: 'importPresets', presets: { 'Test A': { frequencies: s.eqFilters.map((f) => f.frequency), gains: Array(11).fill(0), qs: Array(11).fill(0.7071) } } });
        s = await send({ type: 'getStatus' });
        ok('imported preset present', s.presets && 'Test A' in s.presets, JSON.stringify(Object.keys(s.presets || {})));

        // getLogs returns a ring buffer + state
        const logs = await send({ type: 'getLogs' });
        ok('getLogs returns log[]', logs && Array.isArray(logs.log) && logs.log.length > 0);
        ok('getLogs state has sampleRate', logs && logs.state && typeof logs.state.sampleRate === 'number');

        // buildStatus never threw (we got here) and no UNCAUGHT in logs
        ok('no uncaught errors in engine log', !logs.log.some((l) => /UNCAUGHT|UNHANDLED/.test(l)),
          logs.log.filter((l) => /UNCAUGHT|UNHANDLED/.test(l)).join(' | '));
      } catch (e) {
        ok('suite ran without throwing', false, String(e && e.stack || e));
      }

      const passed = results.filter((r) => r.pass).length;
      const failed = results.length - passed;
      window.__results = { passed, failed, total: results.length, results };
      document.getElementById('summary').innerHTML =
        (failed === 0 ? '<span class=pass>ALL PASS</span> ' : '<span class=fail>' + failed + ' FAILED</span> ') +
        passed + '/' + results.length;
      const ol = document.getElementById('results');
      results.forEach((r) => {
        const li = document.createElement('li');
        li.className = r.pass ? 'pass' : 'fail';
        li.textContent = (r.pass ? '✓ ' : '✗ ') + r.name + (r.pass ? '' : '  — ' + r.extra);
        ol.appendChild(li);
      });
    })();
  </script>
</body>
</html>

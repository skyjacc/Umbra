<!DOCTYPE html>
<html>
<head><meta charset="utf-8" /><title>legacy preset clamp regression</title></head>
<body>
  <div id="summary">running…</div>
  <ol id="results"></ol>
  <script>
    // A dirty legacy preset: gains way out of range (+/-99 dB), frequencies
    // out of range / negative / non-numeric, junk Q. This is the exact class of
    // data that used to push EQ dots off-canvas so they couldn't be grabbed.
    const _msg = []; const _chg = [];
    const syncStore = {
      'PRESETS.legacyDirty': {
        frequencies: [-50, 0, 999999, 'x', 320, 640, 1280, 2560, 5120, 10240, 44000],
        gains: [99, -99, 50, -50, 0, 12, -12, 3, 'nan', 7, 200],
        qs: [0.0001, 500, 0.7, -3, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7]
      },
      'PRESETS.clean': { frequencies: Array(11).fill(1000), gains: Array(11).fill(2), qs: Array(11).fill(0.7) }
    };
    const localStore = {};
    const setCalls = [];
    function fireChange(area, changes) { _chg.forEach((f) => { try { f(changes, area); } catch (e) {} }); }
    window.chrome = {
      runtime: {
        id: 'test', onMessage: { addListener: (f) => _msg.push(f) },
        sendMessage: (m, cb) => { setTimeout(() => cb && cb({ ok: true }), 1); return Promise.resolve(); },
        getURL: (x) => x, getManifest: () => ({ version: 'test' }), get lastError() { return null; }
      },
      tabs: { query: (q, cb) => cb([{ id: 1, title: 't', favIconUrl: '' }]) },
      storage: {
        local: { get: () => Promise.resolve(Object.assign({}, localStore)), set: (o) => { Object.assign(localStore, o); return Promise.resolve(); } },
        sync: {
          get: () => Promise.resolve(Object.assign({}, syncStore)),
          set: (o) => { setCalls.push(o); Object.assign(syncStore, o); fireChange('sync', o); return Promise.resolve(); },
          remove: (k) => { const ks = Array.isArray(k) ? k : [k]; const c = {}; ks.forEach((x) => { delete syncStore[x]; c[x] = {}; }); fireChange('sync', c); return Promise.resolve(); }
        },
        onChanged: { addListener: (f) => _chg.push(f) }
      },
      action: { setBadgeText() {}, setBadgeBackgroundColor() {} }
    };
    try { localStorage.THEME = 'stale-theme'; localStorage.SHOW_VISUALIZER = ''; } catch (e) {}
  </script>
  <div id="app" style="position:absolute;left:-9999px;top:0">
    <span id="readout"></span><span id="warning"></span>
    <button id="vizButton"></button><button id="guideToggle"></button><button id="tabsToggle"></button>
    <div class="screen-bezel"><div id="eqDiv"><svg id="gainSvg" width="30" height="300"></svg><svg id="eqSvg" width="600" height="300"></svg></div>
      <div id="guideDiv" class="screen-overlay"></div><div id="tabsDiv" class="screen-overlay"><div id="eqTabList"></div></div></div>
    <div class="control-rail"><button id="eqTabButton"><span class="btn-label"></span></button>
      <button id="resetFiltersButton"></button><button id="presetDrawerHandle" aria-controls="presetDrawer"><span class="chev"></span></button></div>
    <div id="presetDrawer"><div class="preset-tray"><input id="presetNameInput" /><button id="savePresetButton"></button><button id="deletePresetButton"></button>
      <button id="bassBoostButton" class="pd-row pd-factory"></button><span id="userPresetSpan"></span>
      <button id="exportPresetsButton"></button><button id="importPresetsButton"></button><input type="file" id="importPresetsFile" /></div></div>
    <div id="noticeDiv"></div><button id="diagBtn"></button><select id="themeSelect"><option value="eclipse">Eclipse</option><option value="nocturne">Nocturne</option><option value="aurora">Aurora</option><option value="solar">Solar</option></select>
    <span id="verLabel"></span><a id="fullscreen-link" href="#"></a><div id="dbg"></div>
  </div>
  <script src="../snap.svg-min.js"></script>
  <script src="../popup.js"></script>
  <script>
    const wait = (ms) => new Promise((r) => setTimeout(r, ms));
    const EQW = 600, EQH = 300;
    // Read the live dot geometry straight off the SVG (post-render, post-transform).
    const dots = () => Array.from(document.querySelectorAll('#eqSvg .filterDot')).map((c) => {
      const b = c.getBoundingClientRect();
      const svg = document.getElementById('eqSvg').getBoundingClientRect();
      return { cx: b.left + b.width / 2 - svg.left, cy: b.top + b.height / 2 - svg.top };
    });
    window.addEventListener('load', () => setTimeout(async () => {
      const results = []; const ok = (n, c, e) => results.push({ name: n, pass: !!c, extra: e || '' });
      try {
        await wait(250);
        // Apply the dirty legacy preset through the real code path.
        await applyPresetByName('legacyDirty');
        await wait(120);

        const ds = dots();
        ok('11 dots rendered', ds.length === 11, 'got ' + ds.length);
        const allInsideX = ds.every((d) => d.cx >= 0 && d.cx <= EQW);
        const allInsideY = ds.every((d) => d.cy >= 0 && d.cy <= EQH);
        ok('all dots inside canvas X (grabbable)', allInsideX, JSON.stringify(ds.map((d) => Math.round(d.cx))));
        ok('all dots inside canvas Y (grabbable)', allInsideY, JSON.stringify(ds.map((d) => Math.round(d.cy))));
        const noNaN = ds.every((d) => Number.isFinite(d.cx) && Number.isFinite(d.cy));
        ok('no NaN dot positions', noNaN, JSON.stringify(ds));

        // The stored (persisted) filter values must be clamped to legal ranges.
        const stored = [];
        for (let i = 0; i < 11; i++) stored.push(localStore['filter' + i]);
        const gainsOk = stored.every((s) => s && s.g >= -30 && s.g <= 30);
        const freqOk = stored.every((s) => s && s.f >= 5 && s.f <= 20000);
        const qOk = stored.every((s) => s && s.q >= 0.2 && s.q <= 11);
        ok('applied gains clamped to +/-30', gainsOk, JSON.stringify(stored.map((s) => s && s.g)));
        ok('applied freqs clamped 5..20000', freqOk, JSON.stringify(stored.map((s) => s && s.f)));
        ok('applied Q clamped 0.2..11', qOk, JSON.stringify(stored.map((s) => s && s.q)));

        // Self-heal: reading presets should rewrite the dirty one clean in sync.
        setCalls.length = 0;
        const presets = await refreshPresets();
        await wait(60);
        const healed = syncStore['PRESETS.legacyDirty'];
        const healedGainsOk = healed.gains.every((g) => g >= -30 && g <= 30);
        const healedFreqOk = healed.frequencies.every((f) => f >= 5 && f <= 20000);
        ok('sync self-heal: gains clamped', healedGainsOk, JSON.stringify(healed.gains));
        ok('sync self-heal: freqs clamped', healedFreqOk, JSON.stringify(healed.frequencies));
        ok('self-heal wrote sync once', setCalls.length >= 1, 'writes=' + setCalls.length);
        // A clean preset must NOT be rewritten (no needless churn).
        const cleanUntouched = presets.clean && presets.clean.gains.every((g) => g === 2);
        ok('clean preset untouched', cleanUntouched, JSON.stringify(presets.clean && presets.clean.gains));

        // Idempotent: a second refresh should not write again (already healed).
        setCalls.length = 0;
        await refreshPresets(); await wait(40);
        ok('second refresh: no more heal writes', setCalls.length === 0, 'writes=' + setCalls.length);
      } catch (e) { ok('suite ran', false, String((e && e.stack) || e)); }
      const passed = results.filter((r) => r.pass).length; const failed = results.length - passed;
      window.__results = { passed, failed, total: results.length, results };
      document.getElementById('summary').innerHTML = (failed === 0 ? 'ALL PASS ' : failed + ' FAILED ') + passed + '/' + results.length;
      const ol = document.getElementById('results');
      results.forEach((r) => { const li = document.createElement('li'); li.textContent = (r.pass ? 'PASS ' : 'FAIL ') + r.name + (r.pass ? '' : ' -- ' + r.extra); ol.appendChild(li); });
    }, 300));
  </script>
</body>
</html>

name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    # Windows runner so build-zip.ps1 (System.IO.Compression, forward-slash zip entries)
    # runs exactly as it does locally and produces a Chrome-Web-Store-valid package.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run build

      - name: Verify manifest version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $v = (Get-Content dist/manifest.json -Raw | ConvertFrom-Json).version
          $tag = "${{ github.ref_name }}".TrimStart('v')
          if ($v -ne $tag) { throw "manifest version $v != tag $tag" }
          Write-Host "version $v matches tag"

      - name: Package store zip
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File build-zip.ps1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: umbra-eq-zip
          path: release/*.zip

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
          generate_release_notes: true
